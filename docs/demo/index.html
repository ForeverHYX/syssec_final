<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HardenInspector 静态 Web Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f7;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #66717f;
      --line: #cfd9e3;
      --accent: #1b6b5f;
      --orange: #b7410e;
      --blue: #345995;
      --warn: #9b5c00;
      --code: #111827;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.58 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }
    .wrap { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    header {
      border-bottom: 1px solid var(--line);
      background: #f9fbfd;
      padding: 28px 0 20px;
    }
    h1 { margin: 0; font-size: clamp(28px, 4vw, 44px); letter-spacing: 0; line-height: 1.12; }
    h2 { margin: 0; font-size: 19px; }
    h3 { margin: 0 0 8px; font-size: 16px; }
    p { margin: 8px 0; }
    .subtitle { max-width: 920px; color: var(--muted); font-size: 17px; }
    .notice {
      margin-top: 14px;
      border-left: 4px solid var(--accent);
      background: #f4fbf9;
      border-radius: 6px;
      padding: 12px 14px;
    }
    main {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 18px;
      padding: 18px 0 34px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: 0 12px 24px rgba(31, 41, 51, 0.08);
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 13px 15px;
      border-bottom: 1px solid var(--line);
      background: #fbfdff;
    }
    .content { padding: 15px; }
    .sample-list { display: grid; gap: 8px; padding: 12px; }
    button {
      font: inherit;
    }
    .sample-button {
      width: 100%;
      min-height: 78px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfbf9;
      color: var(--ink);
      padding: 11px;
      text-align: left;
      cursor: pointer;
    }
    .sample-button:hover,
    .sample-button.active {
      border-color: var(--accent);
      outline: 2px solid rgba(27, 107, 95, 0.12);
    }
    .sample-title { display: block; font-weight: 800; margin-bottom: 3px; }
    .muted { color: var(--muted); font-size: 13px; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .badge {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 7px;
      background: #fafaf7;
      color: var(--muted);
      font-size: 12px;
    }
    .category-packer { color: var(--orange); border-color: rgba(183, 65, 14, .35); }
    .category-obfuscation { color: var(--blue); border-color: rgba(52, 89, 149, .35); }
    .category-environment { color: var(--warn); border-color: rgba(155, 92, 0, .35); }
    .category-native { color: var(--accent); border-color: rgba(27, 107, 95, .35); }
    .cards { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 14px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfbf9;
      padding: 12px;
      min-height: 78px;
    }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; }
    .card .value { font-size: 25px; font-weight: 850; }
    .finding {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      margin-top: 10px;
    }
    .finding-head { display: flex; justify-content: space-between; gap: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
    th, td { border-top: 1px solid var(--line); padding: 7px 6px; text-align: left; vertical-align: top; overflow-wrap: anywhere; }
    .demo-link {
      display: inline-flex;
      margin-top: 8px;
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
    }
    pre {
      margin: 8px 0 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border-radius: 7px;
      background: var(--code);
      color: #edf5f2;
      padding: 11px;
      font-size: 12px;
      line-height: 1.48;
    }
    .metrics-table { min-width: 620px; }
    .section-gap { margin-top: 18px; }
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>HardenInspector 静态 Web Demo</h1>
      <p class="subtitle">
        这是部署在独立路径的浏览器演示版。它使用预置扫描报告和指标数据展示 HardenInspector 的证据链，不依赖后端服务。
      </p>
    </div>
  </header>

  <main class="wrap">
    <aside class="panel">
      <div class="toolbar">
        <h2>预置样本</h2>
        <span class="muted">静态导出</span>
      </div>
      <div class="sample-list" id="sampleList"></div>
    </aside>

    <section>
      <div class="panel">
        <div class="toolbar">
          <div>
            <h2 id="selectedTitle">样本扫描报告</h2>
            <div class="muted" id="selectedMeta">预置 JSON evidence chain</div>
          </div>
        </div>
        <div class="content" id="reportContent"></div>
      </div>

      <div class="panel section-gap">
        <div class="toolbar">
          <h2>Benchmark 摘要</h2>
          <span class="muted">34 个评分 APK</span>
        </div>
        <div class="content">
          <table class="metrics-table">
            <thead><tr><th>工具</th><th>Micro Precision</th><th>Micro Recall</th><th>Micro F1</th></tr></thead>
            <tbody id="metricsBody"></tbody>
          </table>
        </div>
      </div>

    </section>
  </main>

  <script>
    const categories = ["packer", "obfuscation", "environment", "native"];
    const labels = {
      packer: "加壳",
      obfuscation: "混淆",
      environment: "环境检测",
      native: "Native",
      clean: "无 finding"
    };
    const samples = [
      {
        id: "fdroid_clean_baseline",
        title: "F-Droid 合成干净基线",
        meta: "合成 Oracle · 低噪声基线",
        description: "用来展示检测器不是看到 APK 就输出 finding。",
        summary: { packer: 0, obfuscation: 0, environment: 0, native: 0 },
        findings: []
      },
      {
        id: "combined_hardened_showcase",
        title: "综合加固展示样本",
        meta: "合成 Oracle · 四类证据链样本",
        description: "合并加壳、混淆、环境检测和 Native 入口证据。",
        summary: { packer: 4, obfuscation: 2, environment: 4, native: 1 },
        findings: [
          {
            id: "packer.dynamic_code_loading",
            category: "packer",
            title: "Dynamic code loading indicators",
            evidence: [
              ["dex-string", "DexClassLoader", "classes.dex:string"],
              ["dex-string", "PathClassLoader", "classes.dex:string"]
            ]
          },
          {
            id: "obfuscation.reflection",
            category: "obfuscation",
            title: "Reflection usage indicators",
            evidence: [
              ["dex-string", "java.lang.reflect.Method", "classes.dex:string"],
              ["method", "Lcom/example/ReflectiveDispatcher;->invoke", "DEX method table"]
            ]
          },
          {
            id: "environment.debugger_probe",
            category: "environment",
            title: "Debugger detection indicators",
            evidence: [
              ["dex-string", "Landroid/os/Debug;", "classes.dex:string"],
              ["method", "Landroid/os/Debug;->waitingForDebugger", "DEX method table"]
            ]
          },
          {
            id: "native.jni_entrypoint",
            category: "native",
            title: "Native JNI entrypoint present",
            evidence: [
              ["elf-symbol", "JNI_OnLoad", "lib/arm64-v8a/libpayload.so:.dynsym"]
            ]
          }
        ]
      },
      {
        id: "native_ptrace_loader",
        title: "Native ptrace 与 loader 信号",
        meta: "合成 Oracle · ELF 符号证据",
        description: "展示 Native anti-debug 和 loader 相关符号。",
        summary: { packer: 1, obfuscation: 0, environment: 1, native: 1 },
        findings: [
          {
            id: "environment.native_debugger_symbol",
            category: "environment",
            title: "Native anti-debug symbol indicators",
            evidence: [["elf-symbol", "ptrace", "lib/arm64-v8a/libnative_probe.so:.dynsym"]]
          },
          {
            id: "packer.native_dynamic_loader",
            category: "packer",
            title: "Native dynamic loader symbol indicators",
            evidence: [["elf-symbol", "android_dlopen_ext", "lib/arm64-v8a/libnative_probe.so:.dynsym"]]
          }
        ]
      },
      {
        id: "adb_developer_settings_probe",
        title: "ADB 与开发者设置探测",
        meta: "合成 Oracle · 环境探测",
        description: "展示 Settings API 与 ADB/developer settings key 的组合证据。",
        summary: { packer: 0, obfuscation: 0, environment: 1, native: 0 },
        findings: [
          {
            id: "environment.adb_settings_probe",
            category: "environment",
            title: "ADB or developer-settings probe",
            evidence: [
              ["dex-string", "Landroid/provider/Settings$Secure;", "classes.dex:string"],
              ["dex-string", "ADB_ENABLED", "classes.dex:string"],
              ["dex-string", "development_settings_enabled", "classes.dex:string"]
            ]
          }
        ]
      }
    ];
    const metrics = [
      ["HardenInspector", "1.000", "1.000", "1.000"],
      ["APKiD", "1.000", "0.186", "0.314"],
      ["Androguard DEX", "0.808", "0.488", "0.609"],
      ["ZIP Strings", "0.833", "0.698", "0.759"]
    ];
    let selected = samples[1];

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }
    function renderSamples() {
      document.getElementById("sampleList").innerHTML = samples.map(sample => `
        <button class="sample-button ${sample.id === selected.id ? "active" : ""}" onclick="selectSample('${esc(sample.id)}')">
          <span class="sample-title">${esc(sample.title)}</span>
          <span class="muted">${esc(sample.meta)}</span>
          <span class="muted" style="display:block;margin-top:5px;">${esc(sample.description)}</span>
          <span class="badge-row">
            ${(Object.entries(sample.summary).filter(([, count]) => count > 0).map(([category]) => category).length ? Object.entries(sample.summary).filter(([, count]) => count > 0).map(([category]) => category) : ["clean"]).map(category => `<span class="badge category-${esc(category)}">${esc(labels[category] || category)}</span>`).join("")}
          </span>
        </button>
      `).join("");
    }
    function renderReport() {
      document.getElementById("selectedTitle").textContent = selected.title;
      document.getElementById("selectedMeta").textContent = selected.meta;
      const cards = categories.map(category => `
        <div class="card"><div class="label">${esc(labels[category])}</div><div class="value">${selected.summary[category] || 0}</div></div>
      `).join("");
      const findings = selected.findings.length ? selected.findings.map(finding => `
        <article class="finding">
          <div class="finding-head">
            <strong>${esc(finding.title)}</strong>
            <span class="badge category-${esc(finding.category)}">${esc(labels[finding.category])}</span>
          </div>
          <div class="muted">${esc(finding.id)}</div>
          <table>
            <thead><tr><th>证据</th><th>取值</th><th>位置</th></tr></thead>
            <tbody>${finding.evidence.map(row => `<tr><td>${esc(row[0])}</td><td>${esc(row[1])}</td><td>${esc(row[2])}</td></tr>`).join("")}</tbody>
          </table>
        </article>
      `).join("") : `<div class="notice">该样本没有 finding，用于展示低噪声基线。</div>`;
      document.getElementById("reportContent").innerHTML = `<div class="cards">${cards}</div><p>${esc(selected.description)}</p>${findings}`;
    }
    function selectSample(id) {
      selected = samples.find(sample => sample.id === id) || samples[0];
      renderSamples();
      renderReport();
    }
    function renderMetrics() {
      document.getElementById("metricsBody").innerHTML = metrics.map(row => `
        <tr><td>${esc(row[0])}</td><td>${esc(row[1])}</td><td>${esc(row[2])}</td><td>${esc(row[3])}</td></tr>
      `).join("");
    }
    renderSamples();
    renderReport();
    renderMetrics();
  </script>
</body>
</html>
